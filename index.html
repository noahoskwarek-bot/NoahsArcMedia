<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noah's Arc Media | Custom Tribute Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            content: ["./**/*.html"],
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
       
        :root { --gold: #d4af37; }
       
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }
        
        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)),
                        url('https://picsum.photos/id/1015/2000/1200') center/cover;
            background-attachment: fixed;
        }
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(212 175 55 / 0.25);
        }
        .nav-link {
            position: relative;
        }
        .nav-link:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #d4af37;
            transition: width 0.3s ease;
        }
        .nav-link:hover:after { width: 100%; }
        .film-grain {
            position: relative;
        }
        .film-grain::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none;
            z-index: 1;
            animation: grain 8s steps(10) infinite;
        }
        @keyframes grain {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2%, -2%); }
            100% { transform: translate(0, 0); }
        }
        .modal {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-100">
    <!-- NAV -->
    <nav class="bg-black/90 backdrop-blur-lg fixed w-full z-50 border-b border-amber-900">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="11d67ea5-8f5a-4dad-b324-9a242bcd4308.jpg" 
                     class="h-16 w-auto">
            </div>
           
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#services" class="nav-link text-zinc-300 hover:text-amber-300">Services</a>
                <a href="#portfolio" class="nav-link text-zinc-300 hover:text-amber-300">Portfolio</a>
                <a href="#how" class="nav-link text-zinc-300 hover:text-amber-300">How it Works</a>
                <a href="#pricing" class="nav-link text-zinc-300 hover:text-amber-300">Pricing</a>
                <a href="#contact" class="nav-link text-zinc-300 hover:text-amber-300">Contact</a>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-zinc-800 transition-colors">
                    <i class="fa-solid fa-moon text-amber-300"></i>
                </button>
                <button onclick="document.getElementById('contact').scrollIntoView({ behavior: 'smooth' })"
                        class="bg-amber-300 hover:bg-amber-200 text-zinc-950 px-6 py-2.5 rounded-full font-semibold text-sm transition-all">
                    START YOUR STORY
                </button>
                <button id="mobile-menu-btn" class="md:hidden text-2xl">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- HERO + All other sections (services, portfolio, etc.) remain unchanged from previous version -->

    <script>
        function toggleDarkMode() {
            alert("Dark mode is already active ✨");
        }

        const portfolioItems = [
            { title: "Lucas Graduation Tribute", category: "Graduation", thumb: "https://picsum.photos/id/1015/600/400", video: "https://www.youtube.com/embed/dQw4w9wgxcq" },
            { title: "PHS Tennis Season 2026", category: "Sports", thumb: "https://picsum.photos/id/201/600/400", video: "https://www.youtube.com/embed/dQw4w9wgxcq" },
            { title: "25th Anniversary Film", category: "Anniversary", thumb: "https://picsum.photos/id/133/600/400", video: "https://www.youtube.com/embed/dQw4w9wgxcq" }
        ];

        function renderPortfolio() {
            const container = document.getElementById('portfolio-grid');
            container.innerHTML = portfolioItems.map(item => `
                <div onclick="playVideo('${item.video}', '${item.title}')"
                     class="group cursor-pointer bg-zinc-800 rounded-3xl overflow-hidden">
                    <div class="relative">
                        <img src="${item.thumb}" class="w-full h-64 object-cover transition-transform group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent flex items-end p-6">
                            <div>
                                <p class="text-amber-300 text-xs">${item.category}</p>
                                <p class="font-medium text-lg">${item.title}</p>
                            </div>
                        </div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i class="fa-solid fa-play text-5xl text-white/80 group-hover:scale-110 transition-transform"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function playVideo(videoUrl, title) {
            const modal = document.getElementById('video-modal');
            const container = document.getElementById('modal-video-container');
            container.innerHTML = `<iframe width="100%" height="100%" src="${videoUrl}" title="${title}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            modal.classList.remove('hidden'); modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('video-modal');
            modal.classList.add('hidden'); modal.classList.remove('flex');
        }

        function handleSubmit(e) {
            e.preventDefault();
            alert("Thank you! Your message has been received. We'll contact you shortly.");
            e.target.reset();
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            alert("Mobile menu would expand here.");
        });

        window.onload = function() {
            renderPortfolio();
        };
    </script>
</body>
</html>
