    <title>Noah's Arc Media | Cinematic Tribute Videos for Life's Special Moments</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Rest of your CSS styles remain the same -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
       
        :root {
            --logo-gold: #C9A96E;
            --bright-gold: #d4af37;
        }
       
        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
       
        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }
       
        .heading-font {
            font-family: 'Playfair Display', sans-serif;
        }
        
        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.58)),
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba') center/cover;
            background-attachment: fixed;
        }
        
        @media (max-width: 768px) {
            .hero-bg {
                background-attachment: scroll !important;
            }
        }
        
        .film-grain::after {
            width: 100% !important;
            max-width: 100% !important;
        }
        
        nav, #mobile-menu {
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
        }
        
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .card-hover:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(212 175 55 / 0.25);
        }
        
        .nav-link {
            position: relative;
        }
       
        .nav-link:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #d4af37;
            transition: width 0.3s ease;
        }
       
        .nav-link:hover:after {
            width: 100%;
        }
        
        .film-grain {
            position: relative;
        }
       
        .film-grain::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.03) 2px,
                rgba(255,255,255,0.03) 4px
            );
            pointer-events: none;
            z-index: 1;
            animation: grain 8s steps(10) infinite;
        }
        
        @keyframes grain {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2%, -2%); }
            100% { transform: translate(0, 0); }
        }
        
        .modal {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
       
        @keyframes modalPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        section {
            scroll-margin-top: 30px;
        }

        @media (min-width: 768px) {
            section {
                scroll-margin-top: 150px;
            }
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-100 overflow-x-hidden">

    <!-- NAV -->
    <nav class="bg-black/90 backdrop-blur-lg fixed w-full z-50 border-b border-amber-900">
        <div class="w-full max-w-7xl mx-auto px-5 md:px-8 py-5 flex items-center justify-between">
            <div class="flex items-center">
                <a href="http://www.noahsarcmedia.com/" class="hover:opacity-80 transition-opacity">
                    <img src="Screenshot 2026-07-03 090254.png" alt="Noah's Arc Media" class="h-14 w-auto">
                </a>
            </div>
           
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#services" class="nav-link text-zinc-300 hover:text-[#C9A96E]">Services</a>
                <a href="#portfolio" class="nav-link text-zinc-300 hover:text-[#C9A96E]">Portfolio</a>
                <a href="#how" class="nav-link text-zinc-300 hover:text-[#C9A96E]">How it Works</a>
                <a href="#pricing" class="nav-link text-zinc-300 hover:text-[#C9A96E]">Pricing</a>
                <a href="#contact" class="nav-link text-zinc-300 hover:text-[#C9A96E]">Contact</a>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="document.getElementById('contact').scrollIntoView({ behavior: 'smooth' })"
                        class="bg-[#C9A96E] hover:bg-[#b38c55] text-zinc-950 px-6 py-2.5 rounded-full font-semibold text-sm transition-all hidden sm:block">
                    START YOUR STORY
                </button>
                
                <button id="mobile-menu-btn" class="md:hidden text-2xl w-10 h-10 flex items-center justify-center">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Rest of your website content remains exactly the same -->
    <!-- (NAV, HERO, SERVICES, GALLERY, HOW IT WORKS, TESTIMONIALS, PRICING, CONTACT FORM, FOOTER, etc.) -->

    <!-- VIDEO MODAL -->
    <div id="video-modal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center">
        <div class="modal max-w-4xl w-full mx-4 bg-zinc-900 rounded-3xl overflow-hidden">
            <div class="flex justify-end p-4">
                <button onclick="closeModal()" class="text-3xl text-zinc-400 hover:text-white">&times;</button>
            </div>
            <div id="modal-video-container" class="aspect-video bg-black p-2"></div>
        </div>
    </div>

    <script>
        // All your existing JavaScript remains the same
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const btn = document.getElementById('mobile-menu-btn');
            const icon = btn.querySelector('i');
            
            menu.classList.toggle('hidden');
            
            if (!menu.classList.contains('hidden')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', toggleMobileMenu);

        function selectPackage(packageName) {
            document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
            
            setTimeout(() => {
                const select = document.getElementById('package-select');
                if (select) {
                    select.value = packageName;
                }
            }, 900);
        }

        const portfolioItems = [
            { 
                title: "Lucas Graduation Tribute", 
                category: "Graduation", 
                thumb: "lucgrad.png", 
                video: "https://www.youtube.com/embed/fNghcZdeVIE" 
            },
            { 
                title: "PHS Tennis Team 2026", 
                category: "Sports", 
                thumb: "phsteniss.png", 
                video: "https://www.youtube.com/embed/pYu8nO4OlgY" 
            },
            { 
                title: "50th Anniversary Film", 
                category: "Anniversary", 
                thumb: "50years.png", 
                video: "https://www.youtube.com/embed/kEOlFuurM4o" 
            }
        ];

        function renderPortfolio() {
            const container = document.getElementById('portfolio-grid');
            container.innerHTML = portfolioItems.map(item => `
                <div onclick="playVideo('${item.video}', '${item.title}')"
                     class="group cursor-pointer bg-zinc-800 rounded-3xl overflow-hidden border border-zinc-700">
                    <div class="relative">
                        <img src="${item.thumb}" class="w-full h-64 object-cover transition-transform group-hover:scale-105" alt="${item.title}">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/30">
                            <i class="fa-solid fa-play text-5xl text-white/90 group-hover:scale-110 transition-transform"></i>
                        </div>
                    </div>
                    <div class="p-6">
                        <p class="text-[#C9A96E] text-xs font-medium tracking-wider">${item.category}</p>
                        <p class="font-semibold text-lg mt-1">${item.title}</p>
                    </div>
                </div>
            `).join('');
        }

        function playVideo(videoUrl, title) {
            const modal = document.getElementById('video-modal');
            const container = document.getElementById('modal-video-container');
            
            container.innerHTML = '';
            
            const iframe = document.createElement('iframe');
            iframe.width = "100%";
            iframe.height = "100%";
            iframe.src = videoUrl;
            iframe.title = title;
            iframe.frameBorder = "0";
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
            iframe.allowFullscreen = true;
            
            container.appendChild(iframe);
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('video-modal');
            const container = document.getElementById('modal-video-container');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            container.innerHTML = '';
        }

        const contactForm = document.getElementById('contact-form');
        const submitBtn = document.getElementById('submit-btn');
        const successMessage = document.getElementById('form-success');

        if (contactForm) {
            contactForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                submitBtn.disabled = true;
                submitBtn.textContent = 'SENDING...';
                
                const formData = new FormData(contactForm);
                
                try {
                    const response = await fetch(contactForm.action, {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        contactForm.reset();
                        successMessage.classList.remove('hidden');
                        submitBtn.textContent = 'MESSAGE SENT';
                        
                        setTimeout(() => {
                            successMessage.classList.add('hidden');
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'SEND MESSAGE';
                        }, 5000);
                    } else {
                        throw new Error('Form submission failed');
                    }
                } catch (error) {
                    alert('Sorry, there was a problem sending your message. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'SEND MESSAGE';
                }
            });
        }

        window.onload = function() {
            renderPortfolio();
        };
    </script>
</body>
</html>
