<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noah's Arc Media | Custom Tribute Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
       
        :root { --gold: #d4af37; }
       
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }

        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)),
                        url('https://picsum.photos/id/1015/2000/1200') center/cover;
            background-attachment: fixed;
        }

        .card-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-12px) scale(1.03); box-shadow: 0 25px 50px -12px rgb(212 175 55 / 0.25); }

        .nav-link { position: relative; }
        .nav-link:after {
            content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0;
            background-color: #d4af37; transition: width 0.3s ease;
        }
        .nav-link:hover:after { width: 100%; }

        .film-grain::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none; z-index: 1; animation: grain 8s steps(10) infinite;
        }
        @keyframes grain { 0% { transform: translate(0, 0); } 10% { transform: translate(-2%, -2%); } 100% { transform: translate(0, 0); } }

        /* Mobile Menu */
        #mobile-menu {
            transition: transform 0.4s ease;
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-100">

    <!-- NAV -->
    <nav class="bg-black/90 backdrop-blur-lg fixed w-full z-50 border-b border-amber-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-5 flex items-center justify-between">
            <!-- Logo -->
            <a href="http://www.noahsarcmedia.com/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <img src="11d67ea5-8f5a-4dad-b324-9a242bcd4308.jpg" class="h-14 sm:h-16 w-auto" alt="Noah's Arc Media">
                <div class="hidden sm:block">
                    <span class="text-xl sm:text-2xl font-bold heading-font tracking-wider text-amber-300">NOAH'S ARC</span>
                    <span class="block text-[10px] text-amber-400 -mt-1 tracking-[3px]">MEDIA</span>
                </div>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#services" class="nav-link text-zinc-300 hover:text-amber-300">Services</a>
                <a href="#portfolio" class="nav-link text-zinc-300 hover:text-amber-300">Portfolio</a>
                <a href="#how" class="nav-link text-zinc-300 hover:text-amber-300">How it Works</a>
                <a href="#pricing" class="nav-link text-zinc-300 hover:text-amber-300">Pricing</a>
                <a href="#contact" class="nav-link text-zinc-300 hover:text-amber-300">Contact</a>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-zinc-800 transition-colors">
                    <i class="fa-solid fa-moon text-amber-300"></i>
                </button>
                <button onclick="document.getElementById('contact').scrollIntoView({ behavior: 'smooth' })"
                        class="bg-amber-300 hover:bg-amber-200 text-zinc-950 px-5 py-2.5 rounded-full font-semibold text-sm transition-all hidden sm:block">
                    START YOUR STORY
                </button>
                <button id="mobile-menu-btn" class="md:hidden text-3xl text-amber-300">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden fixed inset-0 bg-zinc-950 z-50 pt-20 px-6">
            <div class="flex flex-col gap-6 text-lg">
                <a href="#services" class="nav-link py-2 text-zinc-300 hover:text-amber-300" onclick="toggleMobileMenu()">Services</a>
                <a href="#portfolio" class="nav-link py-2 text-zinc-300 hover:text-amber-300" onclick="toggleMobileMenu()">Portfolio</a>
                <a href="#how" class="nav-link py-2 text-zinc-300 hover:text-amber-300" onclick="toggleMobileMenu()">How it Works</a>
                <a href="#pricing" class="nav-link py-2 text-zinc-300 hover:text-amber-300" onclick="toggleMobileMenu()">Pricing</a>
                <a href="#contact" class="nav-link py-2 text-zinc-300 hover:text-amber-300" onclick="toggleMobileMenu()">Contact</a>
            </div>
            <button onclick="toggleMobileMenu()" class="mt-10 text-amber-300 text-xl">✕ Close</button>
        </div>
    </nav>

    <!-- Rest of your sections (Hero, Services, Portfolio, etc.) remain the same but with better mobile spacing if needed -->
    <!-- HERO, SERVICES, etc. ... -->

    <script>
        function toggleDarkMode() {
            alert("Dark mode is already active ✨");
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        // Your existing portfolio, modal, form scripts...
        const portfolioItems = [ /* ... your items ... */ ];

        function renderPortfolio() { /* ... */ }
        function playVideo(videoUrl, title) { /* ... */ }
        function closeModal() { /* ... */ }
        function handleSubmit(e) { /* ... */ }

        document.getElementById('mobile-menu-btn').addEventListener('click', toggleMobileMenu);

        window.onload = function() {
            renderPortfolio();
        };
    </script>
</body>
</html>
